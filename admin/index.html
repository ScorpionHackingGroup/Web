<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ScorpionYug Admin Panel</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>

  <style>
    /* Pre-load screen */
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #0d0d0e; color: #f5f5f7; }
    .nc-app { min-height: 100vh; }

    /* Custom branding for login page */
    .nc-app-header-main {
      background: linear-gradient(135deg, #b8472a 0%, #9a3a22 100%) !important;
    }

    /* Better responsive design */
    @media (max-width: 768px) {
      .nc-app-header-main { padding: 1rem !important; }
      .nc-app-header-text-title { font-size: 1.25rem !important; }
    }

    /* Custom color overrides for Decap CMS */
    :root {
      --primary: #b8472a !important;
      --primaryLight: #d97744 !important;
      --primaryDark: #9a3a22 !important;
    }
  </style>
</head>
<body>
  <!-- Decap CMS mounts here -->
  <div id="nc-app"></div>

  <!-- Fallback loading screen -->
  <script>
    // Show loading message while Decap CMS loads
    document.addEventListener('DOMContentLoaded', function() {
      const loader = document.createElement('div');
      loader.id = 'fallback-loader';
      loader.style.cssText = `
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 1.5rem;
        background: #0d0d0e; color: #f5f5f7;
        font-family: 'Inter', sans-serif; z-index: 9999;
      `;
      loader.innerHTML = `
        <div style="font-size: 3rem; color: #b8472a;">⬢</div>
        <div style="font-size: 1.5rem; font-weight: 700; font-family: 'Sora', sans-serif;">ScorpionYug Admin</div>
        <div style="color: #a1a1aa; font-size: 0.9rem;">Loading Decap CMS...</div>
        <div style="width: 200px; height: 3px; background: #27272a; border-radius: 999px; overflow: hidden;">
          <div style="width: 100%; height: 100%; background: linear-gradient(90deg, #b8472a, #e89971); animation: loading 1.5s ease-in-out infinite;"></div>
        </div>
        <style>
          @keyframes loading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0); }
            100% { transform: translateX(100%); }
          }
        </style>
      `;
      document.body.appendChild(loader);

      // Hide loader when CMS is ready
      setTimeout(() => {
        const l = document.getElementById('fallback-loader');
        if (l) l.style.display = 'none';
      }, 2000);
    });
  </script>
</body>
</html>
