<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LinkCard Studio — Bio Page Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bone:#F7F6F3;
--white:#FFFFFF;
--ink:#111111;
--ink2:#2F3437;
--muted:#787774;
--border:#EAEAEA;
--card:#F9F9F8;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bone);color:var(--ink2);min-height:100dvh;font-size:1rem;line-height:1.6;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100dvh}
header{background:rgba(247,246,243,0.88);backdrop-filter:blur(1rem);border-bottom:0.0625rem solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:1.15rem;letter-spacing:-0.02em;color:var(--ink);display:flex;align-items:center;gap:0.5rem}
.logo-badge{font-family:'JetBrains Mono',monospace;font-size:0.65rem;background:#E1F3FE;color:#1F6C9F;padding:0.18rem 0.5rem;border-radius:9999rem;letter-spacing:0.05em;text-transform:uppercase}
.preview-btn{background:var(--ink);color:#fff;border:none;padding:0.5rem 1rem;border-radius:0.375rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:0.35rem;transition:background 0.15s,transform 0.12s}
.preview-btn:hover{background:#333}
.preview-btn:active{transform:scale(0.97)}
main{flex:1;padding:1.25rem;max-width:42rem;margin:0 auto;width:100%}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);margin-bottom:0.9rem;display:flex;align-items:center;gap:0.5rem}
.sec-label::after{content:'';flex:1;height:0.0625rem;background:var(--border)}
.card{background:var(--white);border:0.0625rem solid var(--border);border-radius:0.75rem;padding:1.25rem;margin-bottom:1.1rem;transition:box-shadow 0.2s}
.pfp-block{display:flex;flex-direction:column;align-items:center;gap:0.9rem}
.pfp-wrap{position:relative;width:5.5rem;height:5.5rem;cursor:pointer}
.pfp-img{width:5.5rem;height:5.5rem;border-radius:50%;object-fit:cover;border:0.125rem solid var(--border);background:var(--bone)}
.pfp-over{position:absolute;inset:0;border-radius:50%;background:rgba(17,17,17,0.42);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.18s}
.pfp-wrap:hover .pfp-over{opacity:1}
.pfp-over i{color:#fff;font-size:1.2rem}
#pfp-file,#banner-file{display:none}
.pfp-actions{display:flex;flex-direction:column;gap:0.45rem;width:100%;max-width:17rem}
.ig-row{display:flex;gap:0.4rem}
.ig-row input{flex:1}
.fetch-btn{background:#E1F3FE;color:#1F6C9F;border:0.0625rem solid rgba(31,108,159,0.15);border-radius:0.375rem;padding:0 0.8rem;font-size:0.78rem;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:background 0.15s;display:flex;align-items:center;gap:0.3rem}
.fetch-btn:hover{background:#c8e9fd}
.fetch-status{font-size:0.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.form-row{display:flex;flex-direction:column;gap:0.3rem;margin-bottom:0.85rem}
.form-row:last-child{margin-bottom:0}
label{font-size:0.76rem;font-weight:500;color:var(--ink)}
input[type=text],input[type=email],input[type=url],input[type=tel],input[type=date],textarea,select{width:100%;border:0.0625rem solid var(--border);border-radius:0.45rem;padding:0.55rem 0.75rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--ink2);background:var(--bone);outline:none;transition:border-color 0.15s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:#aaa}
textarea{resize:vertical;min-height:4rem}
.banner-box{width:100%;height:4.5rem;border-radius:0.55rem;border:0.0625rem dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bone);overflow:hidden;position:relative;transition:background 0.15s}
.banner-box:hover{background:#eee}
.banner-box img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.banner-lbl{font-size:0.76rem;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:0.25rem;z-index:1}
.social-list{display:flex;flex-direction:column;gap:0.65rem}
.social-item{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.8rem;background:var(--bone);border:0.0625rem solid var(--border);border-radius:0.55rem}
.s-icon{width:1.9rem;height:1.9rem;border-radius:0.35rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-icon img{width:1.05rem;height:1.05rem;object-fit:contain}
.s-body{flex:1;min-width:0}
.s-name{font-size:0.74rem;font-weight:500;color:var(--ink);margin-bottom:0.15rem}
.s-body input{padding:0.3rem 0.55rem;font-size:0.78rem}
.tog{position:relative;width:2.2rem;height:1.2rem;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:9999rem;cursor:pointer;transition:background 0.2s}
.tog-track::after{content:'';position:absolute;width:0.9rem;height:0.9rem;background:#fff;border-radius:50%;top:0.15rem;left:0.15rem;transition:transform 0.2s;box-shadow:0 0.0625rem 0.2rem rgba(0,0,0,0.18)}
.tog input:checked+.tog-track{background:var(--ink)}
.tog input:checked+.tog-track::after{transform:translateX(1rem)}
.links-list{display:flex;flex-direction:column;gap:0.65rem}
.link-item{background:var(--bone);border:0.0625rem solid var(--border);border-radius:0.55rem;padding:0.7rem;display:flex;flex-direction:column;gap:0.35rem}
.link-row{display:flex;gap:0.4rem;align-items:center}
.link-row input{flex:1}
.save-link-btn{background:var(--ink);color:#fff;border:none;border-radius:0.35rem;padding:0.45rem 0.9rem;font-size:0.75rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:0.25rem;transition:background 0.15s;white-space:nowrap}
.save-link-btn:hover{background:#333}
.del-btn{background:#FDEBEC;color:#9F2F2D;border:none;border-radius:0.35rem;width:1.85rem;height:1.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:0.9rem;transition:background 0.15s}
.del-btn:hover{background:#fbd4d5}
.add-btn{display:flex;align-items:center;gap:0.45rem;background:transparent;border:0.0625rem dashed var(--border);border-radius:0.45rem;padding:0.6rem 0.9rem;font-size:0.8rem;font-weight:500;color:var(--muted);cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;transition:border-color 0.15s,color 0.15s}
.add-btn:hover{border-color:#bbb;color:var(--ink2)}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:1rem}
.theme-swatch{border-radius:0.55rem;border:0.125rem solid transparent;cursor:pointer;overflow:hidden;aspect-ratio:1;transition:border-color 0.15s}
.theme-swatch.active,.theme-swatch:hover{border-color:var(--ink)}
.t-inner{height:100%;display:flex;flex-direction:column}
.t-top{flex:1}
.t-bot{height:35%;display:flex;align-items:center;padding:0.22rem 0.3rem}
.t-dot{width:0.55rem;height:0.55rem;border-radius:50%;margin-right:0.2rem}
.t-line{flex:1;height:0.15rem;border-radius:0.1rem;opacity:0.5}
.t-name{font-size:0.6rem;text-align:center;color:var(--muted);margin-top:0.2rem;font-family:'JetBrains Mono',monospace}
.color-row{display:flex;gap:0.5rem;align-items:center}
.c-pick{-webkit-appearance:none;width:2rem;height:2rem;border:0.0625rem solid var(--border);border-radius:0.35rem;padding:0.12rem;background:var(--bone);cursor:pointer}
.c-pick::-webkit-color-swatch-wrapper{padding:0}
.c-pick::-webkit-color-swatch{border-radius:0.22rem;border:none}
.sel-wrap{position:relative}
.sel-wrap select{appearance:none;padding-right:1.8rem}
.exp-list{display:flex;flex-direction:column;gap:0.6rem}
.exp-btn{display:flex;align-items:center;gap:0.55rem;padding:0.8rem 1.1rem;border-radius:0.5rem;border:0.0625rem solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:background 0.15s;color:var(--ink);width:100%}
.exp-btn:hover{background:var(--bone)}
.exp-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.exp-btn.primary:hover{background:#2a2a2a}
.exp-btn i{font-size:1.05rem}
.modal-bd{position:fixed;inset:0;background:rgba(17,17,17,0.45);backdrop-filter:blur(0.3rem);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-bd.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:1.1rem 1.1rem 0 0;padding:1.25rem;width:100%;max-width:28rem;max-height:92dvh;overflow-y:auto;transform:translateY(2rem);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1)}
.modal-bd.open .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-family:'Playfair Display',serif;font-size:1.05rem;letter-spacing:-0.02em}
.close-btn{background:var(--bone);border:none;border-radius:50%;width:1.85rem;height:1.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.9rem;color:var(--muted)}
.frame-wrap{width:100%;aspect-ratio:9/18;border-radius:0.9rem;border:0.0625rem solid var(--border);overflow:hidden;background:var(--bone)}
.frame-wrap iframe{width:100%;height:100%;border:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(0.6rem)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
.card:nth-child(2){animation-delay:0.07s}
.card:nth-child(3){animation-delay:0.13s}
.card:nth-child(4){animation-delay:0.18s}
.card:nth-child(5){animation-delay:0.23s}
.card:nth-child(6){animation-delay:0.28s}
.card:nth-child(7){animation-delay:0.33s}
.card:nth-child(8){animation-delay:0.38s}
</style>
</head>
<body>
<div class="app">
<header>
<div class="logo">LinkCard <span class="logo-badge">Studio</span></div>
<button class="preview-btn" onclick="openPreview()"><i class="ph ph-eye"></i> Preview</button>
</header>
<main>

<div class="sec-label"><i class="ph ph-user-circle"></i> Profile Photo</div>
<div class="card pfp-block">
<div class="pfp-wrap" onclick="document.getElementById('pfp-file').click()">
<img class="pfp-img" id="pfp-display" src="https://ui-avatars.com/api/?name=MX&background=eaeaea&color=787774&size=200" alt="pfp">
<div class="pfp-over"><i class="ph ph-camera"></i></div>
</div>
<input type="file" id="pfp-file" accept="image/*" onchange="handlePfp(this)">
<div class="pfp-actions">
<!-- Removed Instagram fetch – manual upload only -->
<div class="fetch-status" id="fetch-status" style="text-align:center; width:100%;">Click on avatar to upload photo</div>
</div>
</div>

<div class="sec-label"><i class="ph ph-identification-card"></i> Page Info</div>
<div class="card">
<div class="form-row">
<label>Page Name</label>
<input type="text" id="page-name" value="Majnu X Contents" placeholder="Your page name">
</div>
<div class="form-row">
<label>Username</label>
<input type="text" id="page-username" value="@Majnuxknight" placeholder="@username">
</div>
<div class="form-row">
<label>Bio</label>
<textarea id="page-bio" placeholder="Tell your story...">Content creator. Visual storyteller. Making moments worth sharing.</textarea>
</div>
<div class="form-row">
<label>Category</label>
<input type="text" id="page-category" value="Content Creator" placeholder="e.g. Artist, Brand">
</div>
<div class="form-row">
<label>Location</label>
<input type="text" id="page-location" placeholder="City, Country">
</div>
<div class="form-row">
<label>Date of Birth</label>
<input type="date" id="page-dob">
</div>
</div>

<div class="sec-label"><i class="ph ph-image"></i> Banner</div>
<div class="card">
<div class="banner-box" id="banner-box" onclick="document.getElementById('banner-file').click()">
<div class="banner-lbl"><i class="ph ph-upload-simple" style="font-size:1.2rem"></i><span>Upload banner</span></div>
</div>
<input type="file" id="banner-file" accept="image/*" onchange="handleBanner(this)">
</div>

<div class="sec-label"><i class="ph ph-link"></i> Referral Links</div>
<div class="card">
<div class="links-list" id="links-list"></div>
<button class="add-btn" onclick="addNewLink()"><i class="ph ph-plus"></i> Add link</button>
<p style="font-size:0.7rem; color:var(--muted); margin-top:0.5rem;">Click "Save" after editing each link.</p>
</div>

<div class="sec-label"><i class="ph ph-share-network"></i> Social Channels</div>
<div class="card">
<div class="social-list" id="social-list"></div>
</div>

<div class="sec-label"><i class="ph ph-paint-bucket"></i> Appearance</div>
<div class="card">
<div class="form-row"><label>Theme Preset</label></div>
<div class="theme-grid" id="theme-grid"></div>
<div class="form-row">
<label>Background</label>
<div class="color-row">
<input type="color" class="c-pick" id="bg-color" value="#F7F6F3" oninput="onColor('bg',this.value)">
<input type="text" id="bg-color-txt" value="#F7F6F3" style="flex:1" oninput="syncColor('bg',this.value)" placeholder="#HEX">
</div>
</div>
<div class="form-row">
<label>Accent</label>
<div class="color-row">
<input type="color" class="c-pick" id="ac-color" value="#111111" oninput="onColor('ac',this.value)">
<input type="text" id="ac-color-txt" value="#111111" style="flex:1" oninput="syncColor('ac',this.value)" placeholder="#HEX">
</div>
</div>
<div class="form-row">
<label>Text Color</label>
<div class="color-row">
<input type="color" class="c-pick" id="tx-color" value="#2F3437" oninput="onColor('tx',this.value)">
<input type="text" id="tx-color-txt" value="#2F3437" style="flex:1" oninput="syncColor('tx',this.value)" placeholder="#HEX">
</div>
</div>
<div class="form-row">
<label>Card Style</label>
<div class="sel-wrap">
<select id="card-style">
<option value="flat">Flat</option>
<option value="glass">Glass</option>
<option value="outlined">Outlined</option>
</select>
</div>
</div>
</div>

<div class="sec-label"><i class="ph ph-export"></i> Export</div>
<div class="card">
<div class="exp-list">
<button class="exp-btn primary" onclick="doDownload()"><i class="ph ph-download-simple"></i> Download HTML</button>
<button class="exp-btn" onclick="doCopy()"><i class="ph ph-copy"></i> Copy Code</button>
<button class="exp-btn" onclick="openPreview()"><i class="ph ph-device-mobile"></i> Preview</button>
</div>
</div>
<div style="height:2.5rem"></div>
</main>
</div>

<div class="modal-bd" id="modal">
<div class="modal">
<div class="modal-hd">
<span class="modal-title">Preview</span>
<button class="close-btn" onclick="closePreview()"><i class="ph ph-x"></i></button>
</div>
<div class="frame-wrap">
<iframe id="preview-iframe" title="preview"></iframe>
</div>
</div>
</div>

<script>
const SOCIALS=[
{id:'instagram',label:'Instagram',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg',bg:'#fde8f0',color:'#E1306C',ph:'https://instagram.com/yourusername'},
{id:'youtube',label:'YouTube',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/youtube.svg',bg:'#ffe5e5',color:'#FF0000',ph:'https://youtube.com/@channel'},
{id:'telegram',label:'Telegram',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/telegram.svg',bg:'#e1f3fe',color:'#2CA5E0',ph:'https://t.me/username'},
{id:'whatsapp',label:'WhatsApp',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/whatsapp.svg',bg:'#edf7f0',color:'#25D366',ph:'+91 9876543210'},
{id:'snapchat',label:'Snapchat',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/snapchat.svg',bg:'#fffde0',color:'#C8A200',ph:'snapchat.com/add/username'},
{id:'email',label:'Email',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/gmail.svg',bg:'#fdecea',color:'#EA4335',ph:'you@email.com'},
{id:'phone',label:'Phone',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/googlemeet.svg',bg:'#f2f2f2',color:'#111',ph:'+91 9876543210'},
{id:'twitter',label:'X / Twitter',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/x.svg',bg:'#f2f2f2',color:'#000',ph:'https://x.com/username'},
{id:'tiktok',label:'TikTok',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/tiktok.svg',bg:'#f2f2f2',color:'#010101',ph:'https://tiktok.com/@username'},
{id:'facebook',label:'Facebook',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/facebook.svg',bg:'#e8f0fe',color:'#1877F2',ph:'https://facebook.com/page'},
{id:'linkedin',label:'LinkedIn',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/linkedin.svg',bg:'#e8f0fe',color:'#0A66C2',ph:'https://linkedin.com/in/username'},
{id:'spotify',label:'Spotify',icon:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/spotify.svg',bg:'#edf7f0',color:'#1DB954',ph:'https://open.spotify.com/artist/...'},
];

const THEMES=[
{name:'Bone',bg:'#F7F6F3',ac:'#111111',tx:'#2F3437'},
{name:'Dark',bg:'#0f0f0f',ac:'#ffffff',tx:'#d4d4d4'},
{name:'Rose',bg:'#fff5f5',ac:'#9F2F2D',tx:'#2F3437'},
{name:'Sky',bg:'#f0f8ff',ac:'#1F6C9F',tx:'#1a2a38'},
{name:'Sage',bg:'#f4f6f3',ac:'#346538',tx:'#2a332b'},
{name:'Sand',bg:'#fbf6ee',ac:'#956400',tx:'#3d2e00'},
{name:'Slate',bg:'#f1f3f5',ac:'#3d4d5c',tx:'#2a323b'},
{name:'Pure',bg:'#ffffff',ac:'#111111',tx:'#111111'},
];

let socialState={};
// Fixed links array with proper initial values
let links=[{title:'My YouTube Channel',url:'https://youtube.com/@majnuxknight'},{title:'Join My Telegram',url:'https://t.me/majnuxknight'}];
let pfpData='';
let bannerData='';

function initSocials(){
const list=document.getElementById('social-list');
SOCIALS.forEach(s=>{
socialState[s.id]={enabled:false,value:''};
const d=document.createElement('div');
d.className='social-item';
d.innerHTML=`<div class="s-icon" style="background:${s.bg}"><img src="${s.icon}" alt="${s.label}"></div>
<div class="s-body">
<div class="s-name">${s.label}</div>
<input type="text" placeholder="${s.ph}" oninput="socialState['${s.id}'].value=this.value">
</div>
<label class="tog"><input type="checkbox" onchange="socialState['${s.id}'].enabled=this.checked"><span class="tog-track"></span></label>`;
list.appendChild(d);
});
}

// Fixed renderLinks – includes save button & placeholders
function renderLinks(){
const el=document.getElementById('links-list');
el.innerHTML='';
links.forEach((l,i)=>{
const d=document.createElement('div');
d.className='link-item';
d.innerHTML=`
<div class="link-row">
  <input type="text" placeholder="Link title (e.g. Portfolio)" value="${l.title || ''}" id="link-title-${i}" oninput="links[${i}].title=this.value">
  <button class="del-btn" onclick="deleteLink(${i})"><i class="ph ph-trash"></i></button>
</div>
<div class="link-row">
  <input type="url" placeholder="https://example.com" value="${l.url || ''}" id="link-url-${i}" oninput="links[${i}].url=this.value">
  <button class="save-link-btn" onclick="saveLink(${i})"><i class="ph ph-check-circle"></i> Save</button>
</div>`;
el.appendChild(d);
});
}

// Expose global for HTML onclick
window.deleteLink = function(i) {
  links.splice(i,1);
  renderLinks();
};

window.saveLink = function(i) {
  // Ensure both fields exist; update is already via oninput, just visual feedback
  const titleInput = document.getElementById(`link-title-${i}`);
  const urlInput = document.getElementById(`link-url-${i}`);
  if (titleInput && urlInput) {
    links[i].title = titleInput.value;
    links[i].url = urlInput.value;
  }
  // Show quick feedback
  const btn = event.currentTarget;
  btn.innerHTML = '<i class="ph ph-check"></i> Saved';
  setTimeout(() => { btn.innerHTML = '<i class="ph ph-check-circle"></i> Save'; }, 800);
  // Re-render to keep consistency (optional)
  // renderLinks(); 
};

function addNewLink(){
  links.push({title:'',url:''});
  renderLinks();
}

function addLink(){ addNewLink(); } // alias for compatibility
function rmLink(i){ deleteLink(i); }

function initThemes(){
const grid=document.getElementById('theme-grid');
THEMES.forEach((t,i)=>{
const wrap=document.createElement('div');
wrap.innerHTML=`<div class="theme-swatch${i===0?' active':''}" onclick="applyTheme(${i},this)">
<div class="t-inner"><div class="t-top" style="background:${t.bg};flex:1"></div>
<div class="t-bot" style="background:${t.bg}"><div class="t-dot" style="background:${t.ac}"></div><div class="t-line" style="background:${t.tx}"></div></div></div>
</div><div class="t-name">${t.name}</div>`;
grid.appendChild(wrap);
});
}

function applyTheme(i,el){
const t=THEMES[i];
document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.remove('active'));
el.classList.add('active');
setColorField('bg',t.bg);setColorField('ac',t.ac);setColorField('tx',t.tx);
}

function setColorField(k,v){document.getElementById(`${k}-color`).value=v;document.getElementById(`${k}-color-txt`).value=v}
function onColor(k,v){document.getElementById(`${k}-color-txt`).value=v}
function syncColor(k,v){if(/^#[0-9a-fA-F]{6}$/.test(v))document.getElementById(`${k}-color`).value=v}

function handlePfp(inp){
if(!inp.files[0])return;
const r=new FileReader();
r.onload=e=>{pfpData=e.target.result;document.getElementById('pfp-display').src=pfpData};
r.readAsDataURL(inp.files[0]);
}

function handleBanner(inp){
if(!inp.files[0])return;
const r=new FileReader();
r.onload=e=>{
bannerData=e.target.result;
const b=document.getElementById('banner-box');
b.innerHTML=`<img src="${e.target.result}" alt="banner">`;
};
r.readAsDataURL(inp.files[0]);
}

function getData(){
return{
name:document.getElementById('page-name').value||'Majnu X Contents',
username:document.getElementById('page-username').value||'@Majnuxknight',
bio:document.getElementById('page-bio').value||'',
category:document.getElementById('page-category').value||'',
location:document.getElementById('page-location').value||'',
dob:document.getElementById('page-dob').value||'',
pfp:pfpData||`https://ui-avatars.com/api/?name=${encodeURIComponent(document.getElementById('page-name').value||'MX')}&background=eaeaea&color=787774&size=200`,
banner:bannerData||'',
links:[...links],

function buildHTML(d){
const dark=parseInt(d.bg.replace('#',''),16)<0x606060;
const cb=d.cardStyle==='glass'?`background:${dark?'rgba(255,255,255,0.07)':'rgba(255,255,255,0.82)'};backdrop-filter:blur(0.8rem);-webkit-backdrop-filter:blur(0.8rem);border:0.0625rem solid ${dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.07)'};`
:d.cardStyle==='outlined'?`background:transparent;border:0.125rem solid ${d.ac};`
:`background:${dark?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.9)'};border:0.0625rem solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)'};`;
const mut=dark?'rgba(255,255,255,0.4)':'#787774';
const enabled=Object.entries(d.socials).filter(([,v])=>v.enabled&&v.value);
const iconMap={instagram:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/instagram.svg',youtube:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/youtube.svg',telegram:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/telegram.svg',whatsapp:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/whatsapp.svg',snapchat:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/snapchat.svg',email:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/gmail.svg',phone:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/googlemeet.svg',twitter:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/x.svg',tiktok:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/tiktok.svg',facebook:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/facebook.svg',linkedin:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/linkedin.svg',spotify:'https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/spotify.svg'};
const lblMap={instagram:'Instagram',youtube:'YouTube',telegram:'Telegram',whatsapp:'WhatsApp',snapchat:'Snapchat',email:'Email',phone:'Call',twitter:'X',tiktok:'TikTok',facebook:'Facebook',linkedin:'LinkedIn',spotify:'Spotify'};
function href(id,v){
if(id==='email')return'mailto:'+v;
if(id==='phone'||id==='whatsapp')return'tel:'+v.replace(/\s/g,'');
return v.startsWith('http')?v:'https://'+v;
}
const meta=[
d.category?`<span class="tag"><i class="ph ph-tag"></i>${d.category}</span>`:'',
d.location?`<span class="tag"><i class="ph ph-map-pin"></i>${d.location}</span>`:'',
d.dob?`<span class="tag"><i class="ph ph-cake"></i>${new Date(d.dob).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>`:'',
].filter(Boolean).join('');
const validLinks=d.links.filter(l=>l.title&&l.url);
return`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${d.name}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100dvh;background:${d.bg}}
body{font-family:'DM Sans',sans-serif;color:${d.tx};line-height:1.6;font-size:1rem}
.page{max-width:26rem;margin:0 auto;min-height:100dvh;padding-bottom:3rem}
.banner{width:100%;height:9rem;object-fit:cover;display:block}
.banner-ph{width:100%;height:6rem;background:linear-gradient(135deg,${d.ac}33,${d.ac}55)}
.hero{padding:1.25rem 1.1rem 0.75rem;display:flex;flex-direction:column;align-items:center;text-align:center;${d.banner?'margin-top:-3rem;position:relative':''}}
.ring{width:5.25rem;height:5.25rem;border-radius:50%;border:0.2rem solid ${d.bg};box-shadow:0 0 0 0.15rem ${d.ac};overflow:hidden;margin-bottom:0.65rem}
.ring img{width:100%;height:100%;object-fit:cover}
h1{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:-0.025em;line-height:1.2;margin-bottom:0.15rem}
.uname{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:${mut};margin-bottom:0.55rem}
.bio{font-size:0.88rem;line-height:1.55;opacity:0.82;max-width:19rem;margin:0 auto 0.7rem}
.meta{display:flex;flex-wrap:wrap;justify-content:center;gap:0.35rem 0.75rem;margin-bottom:1.1rem}
.tag{font-size:0.72rem;color:${mut};display:flex;align-items:center;gap:0.28rem}
.links{padding:0 1rem;display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.25rem}
.lcard{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1rem;border-radius:0.7rem;text-decoration:none;color:${d.tx};${cb}transition:transform 0.18s;opacity:0;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards}
.lcard:hover{transform:translateY(-0.1rem)}
.lcard:active{transform:scale(0.97)}
.ltitle{font-weight:500;font-size:0.88rem}
.larrow{opacity:0.38;font-size:0.85rem}
.sec-title{font-family:'JetBrains Mono',monospace;font-size:0.63rem;text-transform:uppercase;letter-spacing:0.09em;color:${mut};margin-bottom:0.65rem;padding:0 1rem}
.socials{padding:0 1rem;margin-bottom:1.5rem}
.s-row{display:flex;flex-wrap:wrap;gap:0.5rem}
.sbtn{display:flex;align-items:center;gap:0.45rem;padding:0.45rem 0.75rem;border-radius:0.45rem;text-decoration:none;font-size:0.78rem;font-weight:500;color:${d.tx};${cb}transition:transform 0.15s;opacity:0;animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards}
.sbtn:hover{transform:translateY(-0.08rem)}
.sbtn:active{transform:scale(0.97)}
.sbtn img{width:0.95rem;height:0.95rem;object-fit:contain;${dark?'filter:invert(1) brightness(2)':''}}
.footer{text-align:center;font-size:0.65rem;color:${mut};font-family:'JetBrains Mono',monospace;opacity:0.5;padding:0 1rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(0.6rem)}to{opacity:1;transform:translateY(0)}}
.hero{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both}
</style>
</head>
<body>
<div class="page">
${d.banner?`<img class="banner" src="${d.banner}" alt="banner">`:`<div class="banner-ph"></div>`}
<div class="hero">
<div class="ring"><img src="${d.pfp}" alt="${d.name}"></div>
<h1>${d.name}</h1>
<div class="uname">${d.username}</div>
${d.bio?`<div class="bio">${d.bio}</div>`:''}
${meta?`<div class="meta">${meta}</div>`:''}
</div>
${validLinks.length?`<div class="links">${validLinks.map((l,i)=>`<a class="lcard" href="${l.url}" target="_blank" rel="noopener" style="animation-delay:${0.1+i*0.07}s"><span class="ltitle">${l.title}</span><i class="ph ph-arrow-up-right larrow"></i></a>`).join('')}</div>`:''}
${enabled.length?`<div class="socials"><div class="sec-title">Find me on</div><div class="s-row">${enabled.map(([id,v],i)=>`<a class="sbtn" href="${href(id,v.value)}" target="_blank" rel="noopener" style="animation-delay:${0.3+i*0.05}s"><img src="${iconMap[id]}" alt="${lblMap[id]}"><span>${lblMap[id]}</span></a>`).join('')}</div></div>`:''}
<div class="footer">Made By Scorpion Yug</div>
</div>
</body>
</html>`;}

function openPreview(){
const iframe=document.getElementById('preview-iframe');
iframe.srcdoc=buildHTML(getData());
document.getElementById('modal').classList.add('open');
}
function closePreview(){document.getElementById('modal').classList.remove('open')}

function doDownload(){
const d=getData();
const html=buildHTML(d);
const a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
a.download=`${d.username.replace('@','')}-bio.html`;
a.click();
}
function doCopy(){
navigator.clipboard.writeText(buildHTML(getData())).then(()=>alert('Copied!'));
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closePreview()});

initSocials();
renderLinks();
initThemes();
</script>
</body>
</html>
